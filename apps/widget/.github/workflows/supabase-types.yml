name: Sync Supabase Types

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  gen-types:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm i -g supabase

      - name: Generate types from Supabase
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF not set"; exit 1;
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set"; exit 1;
          fi
          npx supabase gen types typescript --project-id $SUPABASE_PROJECT_REF --schema public > supabase/types.ts

      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add supabase/types.ts
            git commit -m "chore: sync supabase types"
            git push
          else
            echo "No changes in types."
          fi


